name: Monitor Sismos IGP

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-sismo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Ejecutar monitor
        run: python monitor_sismos.py

      - name: Guardar último ID detectado
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git pull --rebase
          git add ultimo_id.txt
          git diff --staged --quiet || git commit -m "Actualiza último sismo detectado"
          git push
